    <link rel="stylesheet" href="lotto.css" />
    <script>
        function getlotto() {
            let numbers = [];

            while(numbers.length < 6){
                let num = Math.floor(Math.random()*45) + 1;

                if(!numbers.includes(num)){
                    numbers.push(num);
                }
            }
            document.getElementById("lottonumber").innerHTML = "이번 회차의 생성 번호는 " + numbers.join(", ") + " 입니다.";
        }
    </script>
